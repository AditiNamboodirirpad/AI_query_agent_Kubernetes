apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8sgpt-reader
rules:
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "events", "namespaces"]
    verbs: ["get", "list", "watch"]

  # Pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Apps resources
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]

  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sgpt-reader-binding
subjects:
  - kind: ServiceAccount
    name: k8sgpt-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8sgpt-reader
  apiGroup: rbac.authorization.k8s.io
